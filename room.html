<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>날짜 선택</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 0.25rem; }
    .sub { font-size: 13px; color: #888; margin-bottom: 1.25rem; }
    label { font-size: 13px; font-weight: 500; color: #444; display: block; margin-bottom: 6px; }

    /* 이름 입력 화면 */
    .name-screen input[type="text"] {
      width: 100%; height: 44px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
    }
    .name-screen input[type="text"]:focus { border-color: #534AB7; }

    /* 탭 */
    .tabs { display: flex; margin-bottom: 1.25rem; border: 1.5px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
    .tab {
      flex: 1; padding: 10px; text-align: center;
      font-size: 14px; font-weight: 500; cursor: pointer;
      background: white; color: #888; border: none;
      transition: all 0.15s;
    }
    .tab.active { background: #534AB7; color: white; }

    /* 내 이름 표시 */
    .my-name-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: #EEEDFE; border-radius: 10px;
      padding: 10px 14px; margin-bottom: 1rem;
    }
    .my-name-bar span { font-size: 14px; color: #534AB7; font-weight: 500; }
    .change-btn {
      font-size: 12px; color: #888; background: none;
      border: none; cursor: pointer; text-decoration: underline;
    }

    /* 달력 */
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .cal-title { font-size: 15px; font-weight: 600; }
    .cal-nav {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1.5px solid #e0e0e0; background: white;
      cursor: pointer; font-size: 16px; display: flex;
      align-items: center; justify-content: center;
    }
    .cal-nav:hover { background: #f0f0f0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 1rem; }
    .cal-day-label { text-align: center; font-size: 11px; color: #aaa; padding: 4px 0; }
    .cal-day {
      aspect-ratio: 1; border: none; background: none;
      border-radius: 8px; cursor: pointer; font-size: 13px;
      color: #333; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      transition: background 0.1s; position: relative;
    }
    .cal-day:hover:not(.empty):not(.past) { background: #f0f0f0; }
    .cal-day.empty, .cal-day.past { color: #ccc; cursor: default; }
    .cal-day.selected { background: #EEEDFE; color: #534AB7; font-weight: 600; }
    .dots { display: flex; gap: 2px; }
    .dot { width: 4px; height: 4px; border-radius: 50%; }

    /* 저장 버튼 */
    .btn {
      width: 100%; padding: 13px;
      background: #534AB7; color: white;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
      margin-top: 0.5rem;
    }
    .btn:hover { background: #3C3489; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    /* 결과 */
    .result-list { display: flex; flex-direction: column; gap: 8px; }
    .result-item {
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
    }
    .result-item.all-good { border-left: 4px solid #534AB7; }
    .result-date { font-size: 14px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .all-badge {
      font-size: 11px; background: #EEEDFE; color: #534AB7;
      padding: 2px 8px; border-radius: 20px; font-weight: 500;
    }
    .name-pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .pill { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .no-result { text-align: center; color: #aaa; font-size: 14px; padding: 2rem 0; }

    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; display: none; z-index: 100;
    }
    .top-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 480px;
    margin: 0 auto 0.75rem;
}
.nav-btn {
  display: flex; align-items: center; gap: 4px;
  background: none; border: none;
  font-size: 13px; color: #888;
  cursor: pointer; padding: 4px 0;
 }
.nav-btn:hover { color: #534AB7; }
  </style>

</head>
<body>
  <div class="card" id="main-card">
    <div style="text-align:center; padding:3rem 0; color:#aaa;">불러오는 중...</div>
  </div>
  <div class="top-nav">
   <button class="nav-btn" onclick="history.back()">⬅️ 뒤로가기</button>
   <button class="nav-btn" onclick="window.location.href='/'">🏠 메인으로</button>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const SUPABASE_URL = 'https://yauqjmnhplwzjxxwzwci.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhdXFqbW5ocGx3emp4eHd6d2NpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDI5NjcsImV4cCI6MjA5MzcxODk2N30.sh-hUrQ4sMMT13uqw9zDjC89_RZggUTuCn8T4A8D9aw';

    const COLORS = [
      { bg: '#EEEDFE', text: '#3C3489', dot: '#534AB7' },
      { bg: '#E1F5EE', text: '#085041', dot: '#0F6E56' },
      { bg: '#FAECE7', text: '#712B13', dot: '#993C1D' },
      { bg: '#FBEAF0', text: '#72243E', dot: '#993556' },
      { bg: '#EAF3DE', text: '#27500A', dot: '#3B6D11' },
    ];

    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('room');
    const weekdays = ['일','월','화','수','목','금','토'];
    const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

    let roomTitle = '';
    let myName = localStorage.getItem(`myName_${roomId}`) || '';
    let savedDates = {}; // { 이름: ["2025-05-07", ...] }
    let myDates = [];
    let calYear, calMonth;
    let currentTab = 'select';
    let nameColorMap = {}; // 이름 → 색상 인덱스

    async function init() {
      if (!roomId) { document.getElementById('main-card').innerHTML = '<p style="color:red;padding:2rem">잘못된 링크예요.</p>'; return; }

      // 방 정보
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rooms?id=eq.${roomId}&select=*`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const rooms = await res.json();
      if (!rooms.length) { document.getElementById('main-card').innerHTML = '<p style="color:red;padding:2rem">방을 찾을 수 없어요.</p>'; return; }
      roomTitle = rooms[0].title;

      // 기존 선택 가져오기
      await loadAvailabilities();

      const now = new Date();
      calYear = now.getFullYear();
      calMonth = now.getMonth();

      if (!myName) {
        renderNameScreen();
      } else {
        myDates = savedDates[myName] || [];
        renderMainScreen();
      }
    }

    async function loadAvailabilities() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/availabilities?room_id=eq.${roomId}&select=*`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const avails = await res.json();
      savedDates = {};
      avails.forEach(a => {
        savedDates[a.name] = a.dates ? a.dates.split(',') : [];
      });

      // 이름별 색상 고정 배정
      Object.keys(savedDates).forEach((name, i) => {
        if (nameColorMap[name] === undefined) {
          nameColorMap[name] = i % COLORS.length;
        }
      });
    }

    function renderNameScreen() {
      document.getElementById('main-card').innerHTML = `
        <h2>📅 ${roomTitle}</h2>
        <p class="sub">이름을 입력하고 날짜를 선택해주세요</p>
        <div class="name-screen">
          <label>내 이름</label>
          <input type="text" id="name-input" placeholder="이름 입력" maxlength="8" oninput="checkName()">
          <button class="btn" id="name-btn" onclick="submitName()" disabled>시작하기</button>
        </div>
      `;
    }

    function checkName() {
      const val = document.getElementById('name-input').value.trim();
      document.getElementById('name-btn').disabled = !val;
    }

    function submitName() {
      const name = document.getElementById('name-input').value.trim();
      myName = name;
      localStorage.setItem(`myName_${roomId}`, name);
      myDates = savedDates[name] || [];
      if (nameColorMap[name] === undefined) {
        nameColorMap[name] = Object.keys(nameColorMap).length % COLORS.length;
      }
      renderMainScreen();
    }

    function renderMainScreen() {
      document.getElementById('main-card').innerHTML = `
        <h2>📅 ${roomTitle}</h2>
        <p class="sub" id="room-sub"></p>
        <div class="my-name-bar">
          <span>👤 ${myName}으로 참여 중</span>
          <button class="change-btn" onclick="changeName()">이름 변경</button>
        </div>
        <div class="tabs">
          <button class="tab ${currentTab==='select'?'active':''}" onclick="switchTab('select')">날짜 선택</button>
          <button class="tab ${currentTab==='result'?'active':''}" onclick="switchTab('result')">결과 보기</button>
        </div>
        <div id="tab-content"></div>
      `;
      updateSub();
      renderTab();
    }

    function updateSub() {
      const names = Object.keys(savedDates);
      const sub = document.getElementById('room-sub');
      if (sub) sub.textContent = names.length ? names.join(', ') + ' · ' + names.length + '명 참여 중' : '아직 참여자가 없어요';
    }

    function changeName() {
      localStorage.removeItem(`myName_${roomId}`);
      myName = '';
      renderNameScreen();
    }

    function switchTab(tab) {
      currentTab = tab;
      renderMainScreen();
    }

    function renderTab() {
      if (currentTab === 'select') renderSelectTab();
      else renderResultTab();
    }

    function renderSelectTab() {
      const content = document.getElementById('tab-content');
      content.innerHTML = `
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
          <span class="cal-title" id="cal-title"></span>
          <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <button class="btn" id="save-btn" onclick="saveDates()">내 날짜 저장하기</button>
      `;
      renderCal();
    }

    function renderCal() {
      document.getElementById('cal-title').textContent = `${calYear}년 ${months[calMonth]}`;
      const grid = document.getElementById('cal-grid');
      const days = ['일','월','화','수','목','금','토'];
      let html = days.map(d => `<div class="cal-day-label">${d}</div>`).join('');

      const first = new Date(calYear, calMonth, 1).getDay();
      const total = new Date(calYear, calMonth + 1, 0).getDate();
      const today = new Date(); today.setHours(0,0,0,0);

      for (let i = 0; i < first; i++) html += `<div class="cal-day empty"></div>`;

      for (let d = 1; d <= total; d++) {
        const dt = new Date(calYear, calMonth, d);
        const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isPast = dt < today;
        const isSel = myDates.includes(key);

        // 다른 사람 점
        const otherDots = Object.entries(savedDates)
          .filter(([name]) => name !== myName)
          .map(([name, dates]) => {
            const ci = nameColorMap[name] ?? 0;
            return dates.includes(key) ? `<div class="dot" style="background:${COLORS[ci].dot}"></div>` : '';
          }).join('');

        html += `<button class="cal-day${isPast?' past':''}${isSel?' selected':''}"
          onclick="${isPast?'':` toggleDay('${key}')`}">
          ${d}
          ${otherDots ? `<div class="dots">${otherDots}</div>` : ''}
        </button>`;
      }
      grid.innerHTML = html;
    }

    function toggleDay(key) {
      const idx = myDates.indexOf(key);
      if (idx > -1) myDates.splice(idx, 1);
      else myDates.push(key);
      renderCal();
    }

    function changeMonth(dir) {
      calMonth += dir;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCal();
    }

    async function saveDates() {
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = '저장 중...';

      const dates = myDates.join(',');

      const check = await fetch(
        `${SUPABASE_URL}/rest/v1/availabilities?room_id=eq.${roomId}&name=eq.${encodeURIComponent(myName)}`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
      const existing = await check.json();

      if (existing.length > 0) {
        await fetch(
          `${SUPABASE_URL}/rest/v1/availabilities?room_id=eq.${roomId}&name=eq.${encodeURIComponent(myName)}`,
          {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`
            },
            body: JSON.stringify({ dates })
          }
        );
      } else {
        await fetch(`${SUPABASE_URL}/rest/v1/availabilities`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          },
          body: JSON.stringify({ room_id: roomId, name: myName, dates })
        });
      }

      // 저장 후 최신 데이터 다시 불러오기
      await loadAvailabilities();
      savedDates[myName] = myDates;

      showToast('저장됐어요 ✓');
      btn.disabled = false;
      btn.textContent = '내 날짜 저장하기';
      updateSub();
    }

    function renderResultTab() {
      const content = document.getElementById('tab-content');

      // 날짜별 정리
      const dateMap = {};
      Object.entries(savedDates).forEach(([name, dates]) => {
        dates.forEach(d => {
          if (!dateMap[d]) dateMap[d] = [];
          dateMap[d].push(name);
        });
      });

      const sorted = Object.keys(dateMap).sort();
      const totalPeople = Object.keys(savedDates).length;

      if (!sorted.length) {
        content.innerHTML = `<p class="no-result">아직 선택된 날짜가 없어요</p>`;
        return;
      }

      const items = sorted.map(key => {
        const [y, m, d] = key.split('-').map(Number);
        const dt = new Date(y, m-1, d);
        const wday = weekdays[dt.getDay()];
        const people = dateMap[key];
        const isAll = totalPeople > 1 && people.length === totalPeople;
        const pills = people.map(name => {
          const ci = nameColorMap[name] ?? 0;
          const isMe = name === myName;
          return `<span class="pill" style="background:${COLORS[ci].bg};color:${COLORS[ci].text};${isMe?'outline:1.5px solid '+COLORS[ci].dot:''}">
            ${name}${isMe?' (나)':''}
          </span>`;
        }).join('');

        return `<div class="result-item${isAll?' all-good':''}">
          <div class="result-date">
            ${m}월 ${d}일 (${wday})
            ${isAll ? '<span class="all-badge">✓ 전원 가능</span>' : `<span style="font-size:12px;color:#aaa;font-weight:400">${people.length}명</span>`}
          </div>
          <div class="name-pills">${pills}</div>
        </div>`;
      }).join('');

      content.innerHTML = `<div class="result-list">${items}</div>`;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2500);
    }

    init();
  </script>
</body>
</html>
