<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>약속 잡기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 0.25rem; }
    .sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
    label { font-size: 13px; font-weight: 500; color: #444; display: block; margin-bottom: 6px; }
    .count-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .count-btn {
      flex: 1; padding: 12px 0;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      background: white;
      font-size: 15px;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }
    .count-btn:hover { border-color: #534AB7; color: #534AB7; }
    .count-btn.selected { border-color: #534AB7; background: #EEEDFE; color: #534AB7; font-weight: 600; }
    .name-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
    input[type="text"] {
      width: 100%; height: 44px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #534AB7; }
    .btn {
      width: 100%; padding: 14px;
      background: #534AB7; color: white;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: #3C3489; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .spinner { display: none; text-align: center; margin-top: 1rem; color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📅 약속 잡기</h1>
    <p class="sub">친구들과 가능한 날짜를 맞춰보세요</p>

    <label>몇 명이서 만나나요?</label>
    <div class="count-row">
      <button class="count-btn" onclick="selectCount(2)">2인</button>
      <button class="count-btn" onclick="selectCount(3)">3인</button>
      <button class="count-btn" onclick="selectCount(4)">4인</button>
    </div>

    <label>이름을 입력해주세요</label>
    <div class="name-inputs" id="name-inputs">
      <input type="text" placeholder="이름 1" oninput="checkReady()" maxlength="8">
      <input type="text" placeholder="이름 2" oninput="checkReady()" maxlength="8">
    </div>

    <button class="btn" id="create-btn" onclick="createRoom()" disabled>방 만들기</button>
    <div class="spinner" id="spinner">방을 만들고 있어요...</div>
  </div>

  <script>
    // ⚠️ 여기에 본인 Supabase 정보 입력
    const SUPABASE_URL = 'https://yauqjmnhplwzjxxwzwci.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhdXFqbW5ocGx3emp4eHd6d2NpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDI5NjcsImV4cCI6MjA5MzcxODk2N30.sh-hUrQ4sMMT13uqw9zDjC89_RZggUTuCn8T4A8D9aw';

    let count = 2;

    function selectCount(n) {
      count = n;
      document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
      document.querySelectorAll('.count-btn')[n - 2].classList.add('selected');

      const container = document.getElementById('name-inputs');
      container.innerHTML = '';
      for (let i = 0; i < n; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `이름 ${i + 1}`;
        input.maxLength = 8;
        input.oninput = checkReady;
        container.appendChild(input);
      }
      checkReady();
    }

    function checkReady() {
      const inputs = document.querySelectorAll('#name-inputs input');
      const allFilled = Array.from(inputs).every(i => i.value.trim() !== '');
      document.getElementById('create-btn').disabled = !allFilled;
    }

    async function createRoom() {
      const inputs = document.querySelectorAll('#name-inputs input');
      const names = Array.from(inputs).map(i => i.value.trim());

      document.getElementById('create-btn').disabled = true;
      document.getElementById('spinner').style.display = 'block';

      const res = await fetch(`${SUPABASE_URL}/rest/v1/rooms`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=representation'
        },
        body: JSON.stringify({ participant_names: names.join(',') })
      });

      const data = await res.json();
      const roomId = data[0].id;

      // 방 ID를 URL에 넣어서 room.html로 이동
      window.location.href = `/room?room=${roomId}`;
    }

    // 초기 선택
    selectCount(2);
  </script>
</body>
</html>
