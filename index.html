<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>약속 잡기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 0.25rem; }
    .sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
    label { font-size: 13px; font-weight: 500; color: #444; display: block; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%; height: 44px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1.25rem;
    }
    input[type="text"]:focus { border-color: #534AB7; }
    .btn {
      width: 100%; padding: 14px;
      background: #534AB7; color: white;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: #3C3489; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .spinner { display: none; text-align: center; margin-top: 1rem; color: #888; font-size: 14px; }
    .link-box {
      display: none;
      margin-top: 1rem;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #444;
      word-break: break-all;
    }
    .link-box span { color: #534AB7; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📅 약속 잡기</h1>
    <p class="sub">링크를 공유하면 친구들이 각자 날짜를 선택해요</p>

    <label>약속 이름</label>
    <input type="text" id="title-input" placeholder="예) 5월 모임" oninput="checkReady()" maxlength="20">

    <button class="btn" id="create-btn" onclick="createRoom()" disabled>방 만들고 링크 복사하기</button>
    <div class="spinner" id="spinner">방을 만들고 있어요...</div>
    <div class="link-box" id="link-box"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://yauqjmnhplwzjxxwzwci.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhdXFqbW5ocGx3emp4eHd6d2NpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDI5NjcsImV4cCI6MjA5MzcxODk2N30.sh-hUrQ4sMMT13uqw9zDjC89_RZggUTuCn8T4A8D9aw';

    function checkReady() {
      const val = document.getElementById('title-input').value.trim();
      document.getElementById('create-btn').disabled = !val;
    }

    async function createRoom() {
      const title = document.getElementById('title-input').value.trim();
      document.getElementById('create-btn').disabled = true;
      document.getElementById('spinner').style.display = 'block';

      const res = await fetch(`${SUPABASE_URL}/rest/v1/rooms`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=representation'
        },
        body: JSON.stringify({ title })
      });

      const data = await res.json();
      const roomId = data[0].id;
      const link = `${window.location.origin}/room?room=${roomId}`;

      document.getElementById('spinner').style.display = 'none';

      // 클립보드 복사 시도
      try {
        await navigator.clipboard.writeText(link);
        document.getElementById('create-btn').textContent = '✓ 링크가 복사됐어요!';
        document.getElementById('create-btn').style.background = '#0F6E56';
      } catch(e) {
        // 복사 실패 시 링크 직접 표시
        document.getElementById('create-btn').textContent = '✓ 방이 만들어졌어요!';
        document.getElementById('create-btn').style.background = '#0F6E56';
      }

      // 링크 항상 표시
      const linkBox = document.getElementById('link-box');
      linkBox.style.display = 'block';
      linkBox.innerHTML = `친구들에게 이 링크를 보내세요:<br><span>${link}</span>`;
    }
  </script>
</body>
</html>
